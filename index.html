<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudad Catador</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="./assets/img/logo-blanco.svg" alt="Ciudad Catador" width="150">
        </div>
        <nav class="nav-links">
            <a href="#espacios">Espacios</a>
            <a href="#comunidad">Comunidad</a>
            <a href="#contacto" class="btn-outline">Contáctanos</a>
        </nav>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <h1>Descubre el mejor<br>ambiente y licores.</h1>
            <p>Ciudad Catador es el punto de encuentro ideal. Disfruta de la mejor selección de bebidas, gastronomía y entretenimiento.</p>
            <div class="hero-buttons">
                <a href="#comprar" class="btn-primary">Ver Catálogo</a>
                <a href="#mas" class="btn-text">Saber más →</a>
            </div>
        </div>
        
        <div class="hero-image">
            <div class="glow-effect"></div>
        </div>

        <div class="stats-glass-card">
            <div class="stat-item">
                <span class="stat-label">Licores</span>
                <span class="stat-number">500+</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Cortes</span>
                <span class="stat-number">50+</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Locales</span>
                <span class="stat-number">12</span>
            </div>
        </div>
    </main>

    <script src="./js/main.js"></script>
</body>
</html>
